<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f0e16" />
    <script>
      // iOS home-screen webclips don't always match the
      // (display-mode: standalone) media query; mark the root element before
      // first paint so CSS can size the app shell with 100vh there.
      if (window.navigator.standalone === true) {
        document.documentElement.classList.add('standalone');
      }
      // Apply the stored theme before first paint to avoid a flash.
      try {
        if (localStorage.getItem("bsplic.theme") === "light") {
          document.documentElement.classList.add("light");
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) themeMeta.setAttribute("content", "#dc2626");
        }
      } catch (e) {
        /* storage unavailable — default dark theme stays */
      }
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="BSPLIC" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Inline splash: rendered before any JS/CSS loads so the PWA never
         shows a blank screen. Removed by the app once React mounts. -->
    <style>
      #initial-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #0f0e16;
        opacity: 1;
        transition:
          opacity 0.45s ease,
          visibility 0.45s ease;
      }
      #initial-splash.splash-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-aurora {
        position: absolute;
        width: 70vmax;
        height: 70vmax;
        border-radius: 50%;
        filter: blur(70px);
        opacity: 0.32;
        will-change: transform;
      }
      .splash-aurora-red {
        top: -25vmax;
        left: -18vmax;
        background: radial-gradient(
          circle,
          hsl(355 100% 50% / 0.85),
          transparent 65%
        );
        animation: splash-drift 9s ease-in-out infinite alternate;
      }
      .splash-aurora-gold {
        bottom: -28vmax;
        right: -20vmax;
        background: radial-gradient(
          circle,
          hsl(46 98% 54% / 0.55),
          transparent 65%
        );
        animation: splash-drift 11s ease-in-out infinite alternate-reverse;
      }
      @keyframes splash-drift {
        from {
          transform: translate3d(0, 0, 0) scale(1);
        }
        to {
          transform: translate3d(9vmax, 7vmax, 0) scale(1.18);
        }
      }
      .splash-center {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: splash-enter 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes splash-enter {
        from {
          opacity: 0;
          transform: scale(0.9) translateY(10px);
          filter: blur(10px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
          filter: blur(0);
        }
      }
      .splash-wordmark {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        font-size: 38px;
        font-weight: 900;
        font-style: italic;
        letter-spacing: -0.03em;
        line-height: 1;
        white-space: nowrap;
        background: linear-gradient(
          110deg,
          #ffffff 35%,
          hsl(46 98% 64%) 48%,
          hsl(355 100% 62%) 52%,
          #ffffff 65%
        );
        background-size: 250% 100%;
        background-position: 100% 0;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        animation: splash-shimmer 2.4s ease-in-out 0.5s infinite;
      }
      /* 100% and 0% both land in the gradient's solid-white regions, so the
         color band sweeps fully across the text and never parks on it. */
      @keyframes splash-shimmer {
        0% {
          background-position: 100% 0;
        }
        55%,
        100% {
          background-position: 0% 0;
        }
      }
      @keyframes splash-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .splash-track {
        width: 148px;
        height: 4px;
        margin-top: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: hsl(0 0% 100% / 0.12);
        animation: splash-fade-in 0.8s ease 0.5s both;
      }
      .splash-bar {
        height: 100%;
        width: 38%;
        border-radius: 999px;
        background: linear-gradient(90deg, hsl(355 100% 52%), hsl(46 98% 54%));
        animation: splash-bar-slide 1.1s ease-in-out infinite;
      }
      @keyframes splash-bar-slide {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(380%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-aurora,
        .splash-center,
        .splash-wordmark,
        .splash-track,
        .splash-bar {
          animation: none;
        }
      }
    </style>
    <!-- App title -->
    <title>Bsplic 2.0</title>
    <meta name="description" content="Bsplic 2.0" />
    <meta name="author" content="Lovable" />

    <meta property="og:title" content="Bsplic 2.0" />
    <meta property="og:description" content="Bsplic 2.0" />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/382dadfc-733d-4869-b3f6-7fea23fef11d/id-preview-88a2c20b--d7d77ca1-6257-48fe-a69e-e8d4d9d9b5b2.lovable.app-1773441979209.png"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:title" content="Bsplic 2.0" />
    <meta name="twitter:description" content="Bsplic 2.0" />
    <meta
      name="twitter:image"
      content="https://pub-bb2e103a32db4e198524a2e9ed8f35b4.r2.dev/382dadfc-733d-4869-b3f6-7fea23fef11d/id-preview-88a2c20b--d7d77ca1-6257-48fe-a69e-e8d4d9d9b5b2.lovable.app-1773441979209.png"
    />
  </head>

  <body>
    <div id="initial-splash" aria-hidden="true">
      <div class="splash-aurora splash-aurora-red"></div>
      <div class="splash-aurora splash-aurora-gold"></div>
      <div class="splash-center">
        <div class="splash-wordmark">BSPLIC&nbsp;2.0</div>
        <div class="splash-track"><div class="splash-bar"></div></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
